name: Generate README
on:
  workflow_dispatch: # Isse aap GitHub UI se manually run kar sakenge
  push:
    branches:
      - master

jobs:
  readme-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install and Run README AI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pip install readmeai
          # --base-url flag ka istemal
          readmeai --repository . --api openai --model nvidia/nemotron-3-ultra-550b-a55b:free --base-url https://openrouter.ai/api
