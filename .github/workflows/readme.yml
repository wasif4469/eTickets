name: Generate README
on:
  workflow_dispatch: # Isse aap GitHub UI se manually run kar sakenge
  push:
    branches:
      - master

jobs:
  readme-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install and Run README AI
        run: |
          pip install readmeai
          readmeai --repository ${{ github.repository }} --api ${{ secrets.OPENAI_API_KEY }}
